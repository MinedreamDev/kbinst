<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Télécharger un fichier</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="url"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="url"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        
        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: -9999px;
        }
        
        .file-input-label {
            display: block;
            padding: 12px;
            background: #f0f0f0;
            border: 2px dashed #667eea;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            color: #667eea;
            font-weight: 600;
        }
        
        .file-input-label:hover {
            background: #e8e8ff;
            border-color: #764ba2;
        }
        
        .file-name {
            display: block;
            margin-top: 8px;
            color: #666;
            font-size: 12px;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .info-box {
            background: #f0f7ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 5px;
            margin-top: 25px;
            font-size: 13px;
            color: #555;
        }
        
        .success-message {
            display: none;
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .error-message {
            display: none;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }

        .files-list {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 5px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 10px;
        }

        .file-item {
            padding: 10px 12px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s;
        }

        .file-item:hover {
            background-color: #e8e8ff;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-icon {
            font-size: 18px;
            min-width: 25px;
        }

        .file-info {
            flex: 1;
            word-break: break-all;
            font-size: 13px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📥 Télécharger un fichier</h1>
        
        <div class="success-message" id="successMessage">
            ✓ Fichier téléchargé avec succès!
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        
        <form id="downloadForm">
            <!-- Informations du repo GitHub -->
            <div class="form-group">
                <label for="repoOwner">Propriétaire du repo GitHub:</label>
                <input 
                    type="text" 
                    id="repoOwner" 
                    placeholder="ex: MinedreamDev"
                    value="MinedreamDev"
                >
            </div>

            <div class="form-group">
                <label for="repoName">Nom du repo:</label>
                <input 
                    type="text" 
                    id="repoName" 
                    placeholder="ex: kbinst"
                    value="kbinst"
                >
            </div>

            <div class="form-group">
                <label for="branch">Branche:</label>
                <input 
                    type="text" 
                    id="branch" 
                    placeholder="ex: main"
                    value="main"
                >
            </div>

            <!-- Charger les fichiers -->
            <div class="form-group">
                <button type="button" id="loadFilesBtn" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);">
                    📂 Charger les fichiers
                </button>
            </div>

            <!-- Liste des fichiers -->
            <div id="filesContainer" style="display: none;">
                <label>Fichiers disponibles:</label>
                <div class="files-list" id="filesList"></div>
            </div>

            <!-- Chemin du fichier -->
            <div class="form-group">
                <label for="filePath">Chemin du fichier:</label>
                <input 
                    type="text" 
                    id="filePath" 
                    placeholder="ex: README.md ou assets/app.apk"
                    required
                >
            </div>
            
            <!-- Nom du fichier de sortie -->
            <div class="form-group">
                <label for="outputFileName">Nom du fichier de sortie:</label>
                <input 
                    type="text" 
                    id="outputFileName" 
                    placeholder="ex: app.apk"
                >
            </div>
            
            <!-- Bouton de téléchargement -->
            <button type="submit">📥 Télécharger</button>
        </form>
        
        <div class="info-box">
            <strong>ℹ️ Instructions:</strong>
            <ul style="margin-left: 20px; margin-top: 10px;">
                <li>Entrez les informations du repo GitHub</li>
                <li>Cliquez sur "Charger les fichiers" pour voir la liste</li>
                <li>Cliquez sur un fichier ou entrez le chemin manuellement</li>
                <li>Cliquez sur "Télécharger"</li>
            </ul>
        </div>
    </div>
    
    <script>
        const repoOwnerInput = document.getElementById('repoOwner');
        const repoNameInput = document.getElementById('repoName');
        const branchInput = document.getElementById('branch');
        const filePathInput = document.getElementById('filePath');
        const outputFileNameInput = document.getElementById('outputFileName');
        const loadFilesBtn = document.getElementById('loadFilesBtn');
        const filesContainer = document.getElementById('filesContainer');
        const filesList = document.getElementById('filesList');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');
        const form = document.getElementById('downloadForm');

        // Fonction pour obtenir l'icône du fichier
        function getFileIcon(fileName) {
            const ext = fileName.toLowerCase().split('.').pop();
            const icons = {
                'exe': '⚙️',
                'apk': '📱',
                'xapk': '📦',
                'pdf': '📄',
                'zip': '📦',
                'rar': '📦',
                '7z': '📦',
                'txt': '📝',
                'json': '📋',
                'xml': '🔖',
                'md': '📖',
                'jpg': '🖼️',
                'jpeg': '🖼️',
                'png': '🖼️',
                'gif': '🖼️',
                'mp4': '🎬',
                'mp3': '🎵',
                'wav': '🎵',
                'avi': '🎬',
                'doc': '📑',
                'docx': '📑',
                'xls': '📊',
                'xlsx': '📊',
                'ppt': '📊',
                'pptx': '📊',
                'html': '🌐',
                'css': '🎨',
                'js': '⚡',
                'py': '🐍',
                'java': '☕',
                'cpp': '⚙️',
                'c': '⚙️',
            };
            return icons[ext] || '📄';
        }

        // Charger les fichiers du repo
        loadFilesBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            
            const owner = repoOwnerInput.value;
            const repo = repoNameInput.value;
            const branch = branchInput.value;

            if (!owner || !repo || !branch) {
                errorMessage.textContent = '❌ Veuillez remplir tous les champs du repo';
                errorMessage.style.display = 'block';
                return;
            }

            try {
                errorMessage.style.display = 'none';
                loadFilesBtn.textContent = '⏳ Chargement...';
                loadFilesBtn.disabled = true;

                const url = `https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`;
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error('Repo non trouvé ou accès refusé');
                }

                const data = await response.json();
                const files = data.tree.filter(item => item.type === 'blob');

                filesList.innerHTML = '';
                files.forEach(file => {
                    const icon = getFileIcon(file.path);
                    const item = document.createElement('div');
                    item.className = 'file-item';
                    item.innerHTML = `
                        <span class="file-icon">${icon}</span>
                        <span class="file-info">${file.path}</span>
                    `;
                    item.addEventListener('click', () => {
                        filePathInput.value = file.path;
                        if (!outputFileNameInput.value) {
                            outputFileNameInput.value = file.path.split('/').pop();
                        }
                    });
                    filesList.appendChild(item);
                });

                filesContainer.style.display = 'block';
                loadFilesBtn.textContent = '✓ Fichiers chargés!';
                setTimeout(() => {
                    loadFilesBtn.textContent = '📂 Charger les fichiers';
                    loadFilesBtn.disabled = false;
                }, 2000);
            } catch (error) {
                errorMessage.textContent = `❌ Erreur: ${error.message}`;
                errorMessage.style.display = 'block';
                loadFilesBtn.textContent = '📂 Charger les fichiers';
                loadFilesBtn.disabled = false;
            }
        });

        // Soumettre le formulaire
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            successMessage.style.display = 'none';
            errorMessage.style.display = 'none';
            
            try {
                const owner = repoOwnerInput.value;
                const repo = repoNameInput.value;
                const branch = branchInput.value;
                const filePath = filePathInput.value;
                const fileName = outputFileNameInput.value || filePath.split('/').pop();

                if (!owner || !repo || !branch || !filePath) {
                    throw new Error('Veuillez remplir tous les champs requis');
                }

                const url = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${filePath}`;
                
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`Fichier non trouvé (HTTP ${response.status})`);
                }

                const blob = await response.blob();
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                successMessage.style.display = 'block';
            } catch (error) {
                errorMessage.textContent = `❌ Erreur: ${error.message}`;
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
